image:
  repository: ghcr.io/groundsada/jupytercluster
  tag: develop
  pullPolicy: Always

ingress:
  enabled: true
  className: haproxy
  hosts:
    - host: jupytercluster-mfsada-temp.nrp-nautilus.io
      paths:
        - path: /
          pathType: Prefix
  tls:
    - hosts:
        - jupytercluster-mfsada-temp.nrp-nautilus.io
      secretName: jupytercluster-tls

config:
  dbUrl: "sqlite:////data/jupytercluster.db"

  # No prefix — hub name is used as namespace name exactly
  defaultNamespacePrefix: ""

  # Only pre-existing namespaces are allowed; JupyterCluster will not create new ones
  allowNamespaceCreation: false

  # Non-admin users may create/delete hubs (namespace must already exist)
  allowUserNamespaceManagement: true

  # Do not delete namespaces when a hub is deleted
  allowNamespaceDeletion: false

  # Global JupyterHub defaults applied to every hub deployment.
  # Disables prePuller DaemonSets (blocked by admission webhook) and userScheduler.
  defaultHubValues:
    proxy:
      service:
        type: ClusterIP
      chp:
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
      traefik:
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
    hub:
      resources:
        requests:
          cpu: "200m"
          memory: "512Mi"
        limits:
          cpu: "1"
          memory: "1Gi"
    prePuller:
      hook:
        enabled: false
      continuous:
        enabled: false
    scheduling:
      userScheduler:
        enabled: false
      userPlaceholder:
        enabled: false

  authenticator:
    class: "jupytercluster.auth.SimpleAuthenticator"
    users:
      mfsada: mfsada123
    adminUsers:
      mfsada: true

  defaultUsers:
    mfsada:
      admin: true
      allowed_namespaces:
        - mfsada-temp-jc
        - mfsada-jc
        - mfsada-test-armada
        - mfsada-test-armada2

  # Custom GUI schema for this deployment.
  # - allowAdvancedYaml: false  hides the raw YAML tab entirely
  # - fixed: values always applied on top; users cannot override them (enforced client + server)
  # - groups: only these fields are shown in the Simple Editor
  hubValuesSchema:
    allowAdvancedYaml: false
    fixed:
      hub.db.type: sqlite-pvc
      hub.db.pvc.storageClassName: rook-ceph-block
      hub.db.pvc.storage: 1Gi
      cull.enabled: true
      cull.timeout: 3600
      cull.maxAge: 0
      cull.users: false
    groups:
      - title: Single-User Image
        fields:
          - label: Image Name
            path: singleuser.image.name
            type: text
            placeholder: quay.io/jupyter/scipy-notebook
          - label: Image Tag
            path: singleuser.image.tag
            type: text
            placeholder: "latest"
      - title: Single-User Resources
        fields:
          - label: CPU Limit
            path: singleuser.cpu.limit
            type: number
            step: 0.1
            placeholder: "2"
          - label: CPU Guarantee
            path: singleuser.cpu.guarantee
            type: number
            step: 0.1
            placeholder: "0.5"
          - label: Memory Limit
            path: singleuser.memory.limit
            type: text
            placeholder: 4G
          - label: Memory Guarantee
            path: singleuser.memory.guarantee
            type: text
            placeholder: 1G
      - title: Single-User Storage
        fields:
          - label: Storage Type
            path: singleuser.storage.type
            type: select
            default: none
            options: [none, dynamic]
            help: "dynamic provisions a persistent PVC per user."
          - label: Storage Class
            path: singleuser.storage.dynamic.storageClass
            type: text
            default: rook-ceph-block
            showWhen:
              path: singleuser.storage.type
              value: dynamic
          - label: Storage Size
            path: singleuser.storage.capacity
            type: text
            default: 5Gi
            showWhen:
              path: singleuser.storage.type
              value: dynamic
