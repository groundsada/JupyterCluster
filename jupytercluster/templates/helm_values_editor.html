<style>
  .immutable-field {
    background: #f8f9fa;
    border: 1px solid #dee2e6;
    border-radius: 6px;
    padding: 8px 12px 6px;
    pointer-events: none;
    user-select: none;
  }
  .immutable-field .form-control:disabled,
  .immutable-field .form-select:disabled {
    background-color: #e9ecef !important;
    opacity: 1 !important;
    cursor: not-allowed;
    color: #6c757d !important;
    border-color: #ced4da;
  }
  .immutable-field .form-check-input:disabled {
    opacity: 0.5 !important;
    cursor: not-allowed;
  }
  .immutable-field .form-label,
  .immutable-field .form-check-label { color: #6c757d; font-size: 0.875em; }
  .immutable-field .input-group-text { background-color: #e9ecef; }
  .immutable-badge {
    font-size: 0.7em;
    background: #6c757d;
    color: #fff;
    border-radius: 3px;
    padding: 1px 5px;
    margin-left: 6px;
    vertical-align: middle;
    font-weight: normal;
    letter-spacing: 0.02em;
  }
  /* ── Image radio picker ────────────────────────────────────────────── */
  .image-radio-card {
    cursor: pointer;
    min-width: 150px;
    max-width: 220px;
    flex: 0 0 auto;
    border-color: #dee2e6 !important;
    transition: border-color 0.12s, box-shadow 0.12s, background 0.12s;
  }
  .image-radio-card:hover {
    border-color: #0d6efd !important;
    box-shadow: 0 0 0 0.1rem rgba(13,110,253,.18);
  }
  .image-radio-card.selected {
    border-color: #0d6efd !important;
    background: #f0f5ff;
    box-shadow: 0 0 0 0.18rem rgba(13,110,253,.28);
  }
  /* ── Resource tier picker ──────────────────────────────────────────── */
  .resource-tier-card {
    cursor: pointer;
    min-width: 110px;
    max-width: 160px;
    flex: 0 0 auto;
    border-color: #dee2e6 !important;
    transition: border-color 0.12s, box-shadow 0.12s, background 0.12s;
  }
  .resource-tier-card:hover {
    border-color: #198754 !important;
    box-shadow: 0 0 0 0.1rem rgba(25,135,84,.18);
  }
  .resource-tier-card.selected {
    border-color: #198754 !important;
    background: #f0faf4;
    box-shadow: 0 0 0 0.18rem rgba(25,135,84,.28);
  }
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/js-yaml/4.1.0/js-yaml.min.js"></script>

<!-- Schema injected by the server -->
<script id="hub-values-schema" type="application/json">{% raw hub_values_schema_json %}</script>

<!-- Hidden textarea submitted with the form -->
<textarea id="values" name="values" style="display:none">{{ existing_values_yaml }}</textarea>

<ul class="nav nav-tabs mb-3" id="helm-editor-tabs" role="tablist">
  <li class="nav-item" role="presentation">
    <button class="nav-link active" id="simple-tab" data-bs-toggle="tab"
            data-bs-target="#simple-editor-pane" type="button" role="tab">
      <i class="fa fa-sliders"></i> Simple Editor
    </button>
  </li>
  <li class="nav-item" role="presentation" id="advanced-tab-li">
    <button class="nav-link" id="advanced-tab" data-bs-toggle="tab"
            data-bs-target="#advanced-editor-pane" type="button" role="tab">
      <i class="fa fa-code"></i> Advanced (YAML)
    </button>
  </li>
</ul>

<div class="tab-content">
  <div class="tab-pane fade show active" id="simple-editor-pane" role="tabpanel"></div>
  <div class="tab-pane fade" id="advanced-editor-pane" role="tabpanel">
    <textarea class="form-control font-monospace" id="values-yaml-editor" rows="15"
              placeholder="hub: ..."></textarea>
    <small class="form-text text-muted mt-1 d-block">
      Edit raw YAML. Switching back to Simple Editor will attempt to parse your changes.
    </small>
  </div>
</div>

<script>
(function () {
  // ── Utilities ────────────────────────────────────────────────────────────

  function getNestedValue(obj, path) {
    return path.split('.').reduce((o, k) => {
      if (o == null) return undefined;
      const key = /^\d+$/.test(k) ? parseInt(k) : k;
      return o[key];
    }, obj);
  }

  function setNestedValue(obj, path, value) {
    const parts = path.split('.');
    let cur = obj;
    for (let i = 0; i < parts.length - 1; i++) {
      const key = /^\d+$/.test(parts[i]) ? parseInt(parts[i]) : parts[i];
      const nextIsIdx = /^\d+$/.test(parts[i + 1]);
      if (cur[key] == null || typeof cur[key] !== 'object') cur[key] = nextIsIdx ? [] : {};
      cur = cur[key];
    }
    const lastKey = /^\d+$/.test(parts[parts.length - 1])
      ? parseInt(parts[parts.length - 1])
      : parts[parts.length - 1];
    cur[lastKey] = value;
  }

  function escHtml(s) {
    return String(s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;')
      .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  // ── Schema ────────────────────────────────────────────────────────────────

  const schema = JSON.parse(document.getElementById('hub-values-schema').textContent || '{}');
  const pane = document.getElementById('simple-editor-pane');

  function renderSchema() {
    pane.innerHTML = '';
    if (!schema.groups || !schema.groups.length) {
      pane.innerHTML = '<p class="text-muted">No schema configured. Use the Advanced tab.</p>';
      return;
    }

    schema.groups.forEach((group, gi) => {
      if (gi > 0) pane.insertAdjacentHTML('beforeend', '<hr class="my-3">');
      pane.insertAdjacentHTML('beforeend',
        `<h6 class="text-muted mb-2">${escHtml(group.title)}</h6>`);

      const row = document.createElement('div');
      row.className = 'row';

      (group.fields || []).forEach((field, fi) => {
        const col = document.createElement('div');
        col.className = 'col-md-6 mb-3';
        col.dataset.fieldPath = field.path || ('__picker__' + gi + '_' + fi);

        const isImmutable = field.immutable === true;
        if (isImmutable) col.classList.add('immutable-field');

        if (field.showWhen) {
          col.dataset.showWhen = JSON.stringify(field.showWhen);
          col.style.display = 'none';
        }

        const inputId = 'field-' + (field.path || (gi + '-' + fi)).replace(/[\.\d]/g, c => c === '.' ? '-' : c);
        const disAttr = isImmutable ? ' disabled' : '';
        const lockBadge = isImmutable ? ' <span class="immutable-badge">&#128274; locked</span>' : '';

        // ── image-radio ──────────────────────────────────────────────────
        if (field.type === 'image-radio') {
          col.className = 'col-12 mb-3';
          const paths = field.paths || {};
          const namePath = paths.name || 'singleuser.image.name';
          const tagPath = paths.tag || 'singleuser.image.tag';
          const opts = field.options || [];

          let cards = opts.map((opt, idx) => `
            <div class="image-radio-card card border-2" data-idx="${idx}">
              <div class="card-body p-2">
                <div class="fw-semibold small">${escHtml(opt.label)}</div>
                ${opt.description ? `<div class="text-muted" style="font-size:.74em">${escHtml(opt.description)}</div>` : ''}
                <div class="font-monospace mt-1" style="font-size:.68em;word-break:break-all;color:#6c757d">${escHtml(opt.name)}:${escHtml(opt.tag || 'latest')}</div>
              </div>
            </div>`).join('');

          cards += `
            <div class="image-radio-card card border-2" data-idx="custom">
              <div class="card-body p-2">
                <div class="fw-semibold small">Custom</div>
                <div class="text-muted" style="font-size:.74em">Enter manually</div>
              </div>
            </div>`;

          const helpHtml = field.help ? `<small class="form-text text-muted mt-1 d-block">${escHtml(field.help)}</small>` : '';

          col.innerHTML = `
            <label class="form-label fw-semibold">${escHtml(field.label)}${lockBadge}</label>
            <div data-picker-type="image-radio"
                 data-options="${escHtml(JSON.stringify(opts))}"
                 data-name-path="${escHtml(namePath)}"
                 data-tag-path="${escHtml(tagPath)}">
              <div class="d-flex flex-wrap gap-2 mb-1">${cards}</div>
              <div class="image-radio-custom mt-2" style="display:none">
                <div class="row g-2">
                  <div class="col-8">
                    <input type="text" class="form-control form-control-sm"
                           placeholder="Image name (e.g. quay.io/jupyter/scipy-notebook)"
                           data-custom-key="name"${disAttr}>
                  </div>
                  <div class="col-4">
                    <input type="text" class="form-control form-control-sm"
                           placeholder="Tag (e.g. latest)"
                           data-custom-key="tag"${disAttr}>
                  </div>
                </div>
              </div>
              <input type="hidden" data-path="${escHtml(namePath)}" data-picker-role="name">
              <input type="hidden" data-path="${escHtml(tagPath)}" data-picker-role="tag">
            </div>
            ${helpHtml}`;
          row.appendChild(col);
          return;
        }

        // ── resource-picker ──────────────────────────────────────────────
        if (field.type === 'resource-picker') {
          col.className = 'col-12 mb-3';
          const paths = field.paths || {};
          const cpuLimitPath    = paths.cpu_limit    || 'singleuser.cpu.limit';
          const cpuGuarPath     = paths.cpu_guarantee || 'singleuser.cpu.guarantee';
          const memLimitPath    = paths.mem_limit    || 'singleuser.memory.limit';
          const memGuarPath     = paths.mem_guarantee || 'singleuser.memory.guarantee';
          const opts = field.options || [];
          const pathsJson = JSON.stringify({
            cpu_limit: cpuLimitPath, cpu_guarantee: cpuGuarPath,
            mem_limit: memLimitPath, mem_guarantee: memGuarPath
          });

          let cards = opts.map((opt, idx) => `
            <div class="resource-tier-card card border-2" data-idx="${idx}">
              <div class="card-body p-2 text-center">
                <div class="fw-semibold small">${escHtml(opt.label)}</div>
                <div style="font-size:.72em;color:#6c757d">${escHtml(opt.description || (opt.cpu_limit + ' CPU · ' + opt.mem_limit + ' RAM'))}</div>
                <div style="font-size:.68em;color:#adb5bd">${opt.cpu_limit} CPU / ${escHtml(String(opt.mem_limit))}</div>
              </div>
            </div>`).join('');

          cards += `
            <div class="resource-tier-card card border-2" data-idx="custom">
              <div class="card-body p-2 text-center">
                <div class="fw-semibold small">Custom</div>
                <div style="font-size:.72em;color:#6c757d">Set manually</div>
              </div>
            </div>`;

          const helpHtml = field.help ? `<small class="form-text text-muted mt-1 d-block">${escHtml(field.help)}</small>` : '';

          col.innerHTML = `
            <label class="form-label fw-semibold">${escHtml(field.label)}${lockBadge}</label>
            <div data-picker-type="resource-picker"
                 data-options="${escHtml(JSON.stringify(opts))}"
                 data-paths="${escHtml(pathsJson)}">
              <div class="d-flex flex-wrap gap-2 mb-1">${cards}</div>
              <div class="resource-picker-custom mt-2" style="display:none">
                <div class="row g-2">
                  <div class="col-6 col-md-3">
                    <label class="form-label small mb-1">CPU Limit (cores)</label>
                    <input type="number" step="0.1" min="0" class="form-control form-control-sm"
                           placeholder="e.g. 2" data-custom-key="cpu_limit"${disAttr}>
                  </div>
                  <div class="col-6 col-md-3">
                    <label class="form-label small mb-1">CPU Guarantee</label>
                    <input type="number" step="0.1" min="0" class="form-control form-control-sm"
                           placeholder="e.g. 0.5" data-custom-key="cpu_guarantee"${disAttr}>
                  </div>
                  <div class="col-6 col-md-3">
                    <label class="form-label small mb-1">Memory Limit</label>
                    <input type="text" class="form-control form-control-sm"
                           placeholder="e.g. 4G" data-custom-key="mem_limit"${disAttr}>
                  </div>
                  <div class="col-6 col-md-3">
                    <label class="form-label small mb-1">Memory Guarantee</label>
                    <input type="text" class="form-control form-control-sm"
                           placeholder="e.g. 2G" data-custom-key="mem_guarantee"${disAttr}>
                  </div>
                </div>
              </div>
              <input type="hidden" data-path="${escHtml(cpuLimitPath)}"  data-picker-role="cpu_limit">
              <input type="hidden" data-path="${escHtml(cpuGuarPath)}"   data-picker-role="cpu_guarantee">
              <input type="hidden" data-path="${escHtml(memLimitPath)}"  data-picker-role="mem_limit">
              <input type="hidden" data-path="${escHtml(memGuarPath)}"   data-picker-role="mem_guarantee">
            </div>
            ${helpHtml}`;
          row.appendChild(col);
          return;
        }

        // ── Standard field types ─────────────────────────────────────────
        let inputHtml;

        if (field.type === 'hostname') {
          const domain = field.domain || '';
          const mirrorPaths = JSON.stringify(field.mirrorPaths || []);
          const helpId = inputId + '-help-val';
          inputHtml = `
            <div class="input-group">
              <input type="text" class="form-control" id="${inputId}"
                     data-path="${escHtml(field.path)}"
                     data-type="hostname"
                     data-domain="${escHtml(domain)}"
                     data-mirror-paths="${escHtml(mirrorPaths)}"
                     data-help-id="${helpId}"
                     placeholder="${escHtml(field.placeholder || '')}"${disAttr}>
              <span class="input-group-text text-muted">${escHtml(domain)}</span>
            </div>`;
        } else if (field.type === 'select') {
          const opts = (field.options || []).map(o =>
            `<option value="${escHtml(o)}"${o === field.default ? ' selected' : ''}>${escHtml(o)}</option>`
          ).join('');
          inputHtml = `<select class="form-select" id="${inputId}"
                               data-path="${escHtml(field.path)}"${disAttr}
                               ${isImmutable ? 'data-immutable="true"' : ''}>${opts}</select>`;
        } else if (field.type === 'boolean') {
          const defChecked = field.default ? 'checked' : '';
          inputHtml = `
            <div class="form-check mt-1">
              <input class="form-check-input" type="checkbox" id="${inputId}"
                     data-path="${escHtml(field.path)}"
                     ${isImmutable ? 'data-immutable="true"' : ''}
                     ${defChecked}${disAttr}>
              <label class="form-check-label" for="${inputId}">${escHtml(field.label)}</label>
            </div>`;
          col.innerHTML = inputHtml +
            (field.help ? `<small class="form-text text-muted">${escHtml(field.help)}</small>` : '');
          if (isImmutable) {
            col.querySelector('.form-check-label').insertAdjacentHTML('beforeend', lockBadge);
          }
          row.appendChild(col);
          return;
        } else {
          const t = field.type === 'number' ? 'number' : 'text';
          const step = field.step != null ? `step="${field.step}"` : '';
          const ph = field.placeholder ? `placeholder="${escHtml(field.placeholder)}"` : '';
          const val = field.default != null ? `value="${escHtml(String(field.default))}"` : '';
          const extraAttrs = isImmutable ? 'data-immutable="true"' : '';
          inputHtml = `<input type="${t}" class="form-control" id="${inputId}"
                              data-path="${escHtml(field.path)}" ${step} ${ph} ${val}
                              ${extraAttrs}${disAttr}>`;
        }

        const labelHtml = field.type !== 'boolean'
          ? `<label class="form-label" for="${inputId}">${escHtml(field.label)}${lockBadge}</label>`
          : '';

        let helpHtml = '';
        if (field.help) {
          if (field.type === 'hostname' && field.help.includes('{value}')) {
            const helpId = inputId + '-help-val';
            const parts = field.help.split('{value}');
            helpHtml = `<small class="form-text text-muted">${escHtml(parts[0])}<strong id="${helpId}">…</strong>${escHtml(parts[1] || '')}</small>`;
          } else {
            helpHtml = `<small class="form-text text-muted">${escHtml(field.help)}</small>`;
          }
        }

        col.innerHTML = `${labelHtml}${inputHtml}${helpHtml}`;
        row.appendChild(col);
      });

      pane.appendChild(row);
    });

    setupConditionalFields();
    initPickers();

    // Wire up live hostname preview
    document.querySelectorAll('#simple-editor-pane [data-type="hostname"]').forEach(el => {
      const helpId = el.dataset.helpId;
      if (!helpId) return;
      const span = document.getElementById(helpId);
      if (!span) return;
      const update = () => { span.textContent = el.value.trim() || '…'; };
      el.addEventListener('input', update);
      update();
    });
  }

  // ── Picker initialisation ─────────────────────────────────────────────

  function initPickers() {
    // image-radio pickers
    document.querySelectorAll('[data-picker-type="image-radio"]').forEach(picker => {
      const opts = JSON.parse(picker.dataset.options || '[]');
      const customDiv  = picker.querySelector('.image-radio-custom');
      const nameInput  = picker.querySelector('[data-picker-role="name"]');
      const tagInput   = picker.querySelector('[data-picker-role="tag"]');

      function selectImageCard(idx) {
        picker.querySelectorAll('.image-radio-card').forEach(c => c.classList.remove('selected'));
        const card = picker.querySelector(`.image-radio-card[data-idx="${idx}"]`);
        if (card) card.classList.add('selected');
        if (idx === 'custom') {
          customDiv.style.display = '';
        } else {
          customDiv.style.display = 'none';
          const opt = opts[parseInt(idx)];
          if (opt) {
            nameInput.value = opt.name || '';
            tagInput.value  = opt.tag  || 'latest';
          }
        }
      }

      picker.querySelectorAll('.image-radio-card').forEach(card => {
        card.addEventListener('click', () => selectImageCard(card.dataset.idx));
      });

      customDiv.querySelector('[data-custom-key="name"]').addEventListener('input', e => {
        nameInput.value = e.target.value.trim();
      });
      customDiv.querySelector('[data-custom-key="tag"]').addEventListener('input', e => {
        tagInput.value = e.target.value.trim();
      });

      // Sync visual state when hidden inputs are updated (by populateFormFromValues)
      function syncImageVisual() {
        const name = nameInput.value;
        const tag  = tagInput.value;
        if (!name) return;
        const idx = opts.findIndex(o =>
          o.name === name && (o.tag || 'latest') === (tag || 'latest')
        );
        if (idx >= 0) {
          selectImageCard(String(idx));
        } else {
          customDiv.querySelector('[data-custom-key="name"]').value = name;
          customDiv.querySelector('[data-custom-key="tag"]').value  = tag;
          selectImageCard('custom');
        }
      }
      nameInput.addEventListener('change', syncImageVisual);
    });

    // resource-picker pickers
    document.querySelectorAll('[data-picker-type="resource-picker"]').forEach(picker => {
      const opts    = JSON.parse(picker.dataset.options || '[]');
      const customDiv = picker.querySelector('.resource-picker-custom');
      const roleKeys  = ['cpu_limit', 'cpu_guarantee', 'mem_limit', 'mem_guarantee'];
      const getInput  = role => picker.querySelector(`[data-picker-role="${role}"]`);

      function selectTierCard(idx) {
        picker.querySelectorAll('.resource-tier-card').forEach(c => c.classList.remove('selected'));
        const card = picker.querySelector(`.resource-tier-card[data-idx="${idx}"]`);
        if (card) card.classList.add('selected');
        if (idx === 'custom') {
          customDiv.style.display = '';
        } else {
          customDiv.style.display = 'none';
          const opt = opts[parseInt(idx)];
          if (opt) {
            roleKeys.forEach(key => {
              const inp = getInput(key);
              if (inp) inp.value = opt[key] != null ? String(opt[key]) : '';
            });
          }
        }
      }

      picker.querySelectorAll('.resource-tier-card').forEach(card => {
        card.addEventListener('click', () => selectTierCard(card.dataset.idx));
      });

      customDiv.querySelectorAll('[data-custom-key]').forEach(inp => {
        inp.addEventListener('input', () => {
          const hidden = getInput(inp.dataset.customKey);
          if (hidden) hidden.value = inp.value.trim();
        });
      });

      // Sync visual state when hidden inputs are updated (by populateFormFromValues)
      function syncResourceVisual() {
        const vals = {};
        roleKeys.forEach(key => {
          const inp = getInput(key);
          vals[key] = inp ? inp.value : '';
        });
        if (!vals.cpu_limit && !vals.mem_limit) return;
        const idx = opts.findIndex(o =>
          String(o.cpu_limit    || '') === vals.cpu_limit &&
          String(o.cpu_guarantee|| '') === vals.cpu_guarantee &&
          String(o.mem_limit    || '') === vals.mem_limit &&
          String(o.mem_guarantee|| '') === vals.mem_guarantee
        );
        if (idx >= 0) {
          selectTierCard(String(idx));
        } else {
          roleKeys.forEach(key => {
            const customInp = customDiv.querySelector(`[data-custom-key="${key}"]`);
            if (customInp) customInp.value = vals[key];
          });
          selectTierCard('custom');
        }
      }
      // Trigger on any hidden input change (fired by populateFormFromValues)
      const firstHidden = getInput(roleKeys[0]);
      if (firstHidden) firstHidden.addEventListener('change', syncResourceVisual);
    });
  }

  // ── Conditional visibility ─────────────────────────────────────────────

  function setupConditionalFields() {
    document.querySelectorAll('[data-show-when]').forEach(col => {
      const cond = JSON.parse(col.dataset.showWhen);
      const trigger = document.querySelector(`[data-path="${cond.path}"]`);
      if (!trigger) return;
      const update = () => { col.style.display = (trigger.value === cond.value) ? '' : 'none'; };
      trigger.addEventListener('change', update);
      update();
    });
  }

  // ── Populate immutable fields from schema.fixed ────────────────────────

  function populateImmutableFields() {
    if (!schema.fixed) return;
    document.querySelectorAll('#simple-editor-pane [data-immutable="true"]').forEach(el => {
      const fixedVal = schema.fixed[el.dataset.path];
      if (fixedVal == null) return;
      if (el.type === 'checkbox') el.checked = Boolean(fixedVal);
      else el.value = String(fixedVal);
    });
  }

  // ── Build values object from form ─────────────────────────────────────

  function buildValuesFromForm() {
    const values = {};
    document.querySelectorAll('#simple-editor-pane [data-path]').forEach(el => {
      if (el.dataset.immutable === 'true') return;

      const path = el.dataset.path;
      let value;

      if (el.dataset.type === 'hostname') {
        const domain = el.dataset.domain || '';
        const subdomain = el.value.trim();
        if (!subdomain) return;
        const hostname = subdomain + domain;
        value = [hostname];
        setNestedValue(values, 'ingress.enabled', true);
        setNestedValue(values, 'httpRoute.enabled', true);
        try {
          JSON.parse(el.dataset.mirrorPaths || '[]').forEach(mp => {
            setNestedValue(values, mp, [hostname]);
          });
        } catch (e) {}
      } else if (el.type === 'checkbox') {
        value = el.checked;
      } else if (el.type === 'number') {
        value = el.value.trim() !== '' ? parseFloat(el.value) : undefined;
      } else {
        // covers type=hidden (picker outputs) and type=text
        const raw = el.value.trim();
        if (!raw) { value = undefined; }
        else {
          // Coerce purely numeric strings to JS numbers so Helm schema
          // validators receive the correct type (e.g. cpu.limit: 2 not "2").
          const num = parseFloat(raw);
          value = (!isNaN(num) && String(num) === raw) ? num : raw;
        }
      }

      if (value !== undefined) setNestedValue(values, path, value);
    });
    return values;
  }

  // ── Populate form from values object ──────────────────────────────────

  function populateFormFromValues(values) {
    document.querySelectorAll('#simple-editor-pane [data-path]').forEach(el => {
      if (el.dataset.immutable === 'true') return;

      const v = getNestedValue(values, el.dataset.path);
      if (v == null) return;

      if (el.dataset.type === 'hostname') {
        const arr = Array.isArray(v) ? v : [String(v)];
        const domain = el.dataset.domain || '';
        const full = arr[0] || '';
        el.value = (domain && full.endsWith(domain)) ? full.slice(0, -domain.length) : full;
      } else if (el.type === 'checkbox') {
        el.checked = Boolean(v);
      } else {
        el.value = v;
      }
      el.dispatchEvent(new Event('change'));
    });
  }

  // ── Tab sync ─────────────────────────────────────────────────────────

  document.getElementById('advanced-tab').addEventListener('shown.bs.tab', function () {
    const values = buildValuesFromForm();
    document.getElementById('values-yaml-editor').value =
      Object.keys(values).length ? jsyaml.dump(values, { indent: 2 }) : '';
  });

  document.getElementById('simple-tab').addEventListener('shown.bs.tab', function () {
    try {
      const yaml = document.getElementById('values-yaml-editor').value;
      populateFormFromValues(yaml ? (jsyaml.load(yaml) || {}) : {});
    } catch (e) {
      console.warn('Could not parse YAML for simple editor sync:', e);
    }
  });

  // ── Schema-level settings ─────────────────────────────────────────────

  if (schema.allowAdvancedYaml === false) {
    document.getElementById('advanced-tab-li').style.display = 'none';
  }

  // ── Apply fixed values before submit ─────────────────────────────────

  function applyFixedValues(values) {
    if (!schema.fixed) return values;
    Object.entries(schema.fixed).forEach(([path, value]) => {
      setNestedValue(values, path, value);
    });
    return values;
  }

  const editorForm = document.getElementById('helm-editor-tabs').closest('form');
  if (editorForm) {
    editorForm.addEventListener('submit', function () {
      const activeTab = document.querySelector('#helm-editor-tabs .nav-link.active');
      let values;
      if (activeTab && activeTab.id === 'advanced-tab') {
        try { values = jsyaml.load(document.getElementById('values-yaml-editor').value) || {}; }
        catch (e) { values = {}; }
      } else {
        values = buildValuesFromForm();
      }
      values = applyFixedValues(values);
      document.getElementById('values').value =
        Object.keys(values).length ? jsyaml.dump(values, { indent: 2 }) : '';
    });
  }

  // ── Initialise ────────────────────────────────────────────────────────

  renderSchema();
  populateImmutableFields();

  const existingYaml = document.getElementById('values').value.trim();
  if (existingYaml) {
    try {
      const parsed = jsyaml.load(existingYaml) || {};
      populateFormFromValues(parsed);
      document.getElementById('values-yaml-editor').value = existingYaml;
    } catch (e) {
      console.warn('Could not parse existing values YAML:', e);
      document.getElementById('values-yaml-editor').value = existingYaml;
    }
    populateImmutableFields();
  }
})();
</script>
