# Default values for jupytercluster

replicaCount: 1

image:
  repository: jupytercluster
  pullPolicy: IfNotPresent
  tag: "0.1.0"

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  annotations: {}
  name: ""

rbac:
  # Set to false for namespace-scoped RBAC (safer for multi-tenant clusters)
  # Set to true for cluster-scoped RBAC (requires cluster-admin or appropriate permissions)
  clusterScoped: true

podAnnotations: {}

podSecurityContext: {}

securityContext: {}

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

ingress:
  enabled: false
  className: ""
  annotations: {}
  # hosts can be either:
  # - A list of strings: ["example.com", "www.example.com"]
  # - A list of objects with host and paths: [{"host": "example.com", "paths": [{"path": "/", "pathType": "Prefix"}]}]
  hosts:
    - host: jupytercluster.example.com
      paths:
        - path: /
          pathType: Prefix
  # Alternative: simple string list format
  # hosts: ["jupytercluster.example.com"]
  path: "/"  # Default path when using string list format
  pathType: "Prefix"  # Default pathType when using string list format
  tls: []

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 256Mi

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}

persistence:
  enabled: true
  storageClass: ""
  accessMode: ReadWriteOnce
  size: 1Gi

config:
  dbUrl: "sqlite:////data/jupytercluster.db"
  port: 8080
  # Optional prefix prepended to auto-generated namespace names.
  # When a hub is created without an explicit namespace, the namespace is derived as
  # "<defaultNamespacePrefix><hub-name>".  Set to "" to disable the prefix.
  defaultNamespacePrefix: "jupyterhub-"
  defaultHelmChart: "jupyterhub/jupyterhub"
  # Default Helm values merged into every JupyterHub deployment.
  # These are applied before user-supplied values, so users can override them.
  # prePuller is disabled by default: it uses DaemonSets which many clusters block.
  defaultHubValues:
    proxy:
      service:
        type: ClusterIP
    prePuller:
      hook:
        enabled: false
      continuous:
        enabled: false
    scheduling:
      userScheduler:
        enabled: false
      userPlaceholder:
        enabled: false
  # Allow JupyterCluster to create new Kubernetes namespaces for hubs.
  # Set to false to restrict JupyterCluster to only use pre-existing namespaces.
  allowNamespaceCreation: true
  # Allow non-admin users to create/delete hubs (which create/delete namespaces).
  # When false, only admins can create or delete hubs.
  # Can be overridden per-user via can_create_namespaces / can_delete_namespaces in defaultUsers.
  allowUserNamespaceManagement: true
  # When true, deleting a hub also deletes its Kubernetes namespace.
  # When false (default), the namespace is kept after hub deletion.
  # Only namespaces labelled "jupytercluster.io/managed=true" are eligible for deletion.
  allowNamespaceDeletion: false
  # Origins permitted for CORS requests to the API.
  # Use ["*"] to allow all origins (not recommended in production).
  # Empty list (default) disables CORS headers entirely.
  corsAllowOrigins: []
  authenticator:
    class: "jupytercluster.auth.SimpleAuthenticator"
    users: {}
    adminUsers: {}
  # Default users created (or updated) at startup.
  # Supported fields per user:
  #   admin: bool                          - grant admin privileges
  #   allowed_namespaces: [str]            - restrict to specific namespace names (exact match)
  #   max_hubs: int                        - cap on number of hubs this user can create
  #   can_create_namespaces: bool|null     - override allowUserNamespaceManagement for creates
  #   can_delete_namespaces: bool|null     - override allowUserNamespaceManagement for deletes
  # Example:
  #   defaultUsers:
  #     alice:
  #       admin: true
  #     bob:
  #       allowed_namespaces: ["team-bob"]
  #       max_hubs: 2
  #       can_create_namespaces: true
  #       can_delete_namespaces: false
  defaultUsers: {}

